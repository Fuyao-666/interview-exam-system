databases:
  - name: interview-db
    databaseName: interview_exam
    user: interview_user
    plan: free
    region: singapore

services:
  - type: web
    name: interview-exam-system
    env: python
    region: singapore
    plan: free
    buildCommand: "chmod +x build.sh && ./build.sh"
    startCommand: "cd backend && gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: interview-db
          property: connectionString
